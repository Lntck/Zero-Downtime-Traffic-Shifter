services:
  app_blue:
    build: .
    image: zdt-shifter:local
    environment:
      APP_VERSION: "blue"
      APP_COLOR: "blue"
    expose:
      - "8000"

  app_green:
    build: .
    image: zdt-shifter:local
    environment:
      APP_VERSION: "green"
      APP_COLOR: "green"
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app_blue
      - app_green
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
