- name: Provision host and deploy stack
  hosts: zdt
  become: true
  vars:
    repo_url: "https://github.com/OWNER/Zero-Downtime-Traffic-Shifter.git"
    repo_ref: "main"
    deploy_path: "/opt/zero-downtime-traffic-shifter"
    app_user: "ubuntu"
  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        update_cache: true
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present

    - name: Install Docker Engine and plugins
      ansible.builtin.apt:
        update_cache: true
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ app_user }}"
        groups: docker
        append: true

    - name: Checkout repository
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ deploy_path }}"
        version: "{{ repo_ref }}"
        update: true

    - name: Start stack
      ansible.builtin.command: docker compose up -d --build
      args:
        chdir: "{{ deploy_path }}"
