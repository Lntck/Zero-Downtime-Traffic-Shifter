upstream app_blue {
    server app_blue:8000;
}

upstream app_green {
    server app_green:8000;
}

# The active upstream is defined in the included file.
include /etc/nginx/conf.d/active-upstream.conf;

server {
    listen 80;
    server_name _;

    location /healthz {
        proxy_pass http://app_active/health;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://app_active;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
