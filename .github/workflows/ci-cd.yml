name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build-test-switch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        shell: bash
        run: |
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/zdt-shifter" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .

      - name: Push image
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Start blue/green stack
        env:
          ZDT_IMAGE: ${{ env.IMAGE }}:${{ github.sha }}
        run: |
          docker compose up -d --no-build app_blue app_green nginx

      - name: Wait for green
        run: |
          set -euo pipefail
          for i in {1..20}; do
            if curl -sf http://localhost:8081/health >/dev/null; then
              echo "Green is healthy."
              exit 0
            fi
            echo "Waiting for green..."
            sleep 2
          done
          docker compose ps
          docker compose logs --no-color app_green
          exit 1

      - name: Switch traffic to green
        run: |
          bash scripts/switch-traffic.sh green

      - name: Verify green is active
        run: |
          set -euo pipefail
          for i in {1..20}; do
            if curl -sf http://localhost/ | python3 - <<'PY'
          import json, sys
          data = json.load(sys.stdin)
          if data.get("color") != "green":
              raise SystemExit("Expected green traffic")
          PY
            then
              echo "Green traffic confirmed."
              exit 0
            fi
            echo "Waiting for NGINX to route green..."
            sleep 2
          done
          docker compose ps
          docker compose logs --no-color nginx
          exit 1
