name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build-test-switch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        shell: bash
        run: |
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/zdt-shifter" >> "$GITHUB_ENV"
          echo "ZDT_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/zdt-shifter:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .

      - name: Push image
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Start blue/green stack
        run: |
          docker compose up -d --no-build app_blue app_green nginx

      - name: Wait for nginx
        run: |
          set -euo pipefail
          for i in {1..20}; do
            if curl -sf http://localhost/healthz >/dev/null; then
              echo "NGINX is ready."
              exit 0
            fi
            echo "Waiting for nginx..."
            sleep 2
          done
          docker compose ps
          docker compose logs --no-color nginx
          docker compose logs --no-color app_blue
          exit 1

      - name: Wait for green
        run: |
          set -euo pipefail
          for i in {1..20}; do
            if curl -sf http://localhost:8081/health >/dev/null; then
              echo "Green is healthy."
              exit 0
            fi
            echo "Waiting for green..."
            sleep 2
          done
          docker compose ps
          docker compose logs --no-color app_green
          exit 1

      - name: Switch traffic to green
        run: |
          bash scripts/switch-traffic.sh green

      - name: Verify green is active
        run: |
          set -euo pipefail
          for i in {1..20}; do
            headers=$(curl -sS -D - -o /dev/null http://localhost/ || true)
            status=$(printf '%s' "$headers" | head -n1 | awk '{print $2}')
            color=$(printf '%s' "$headers" | awk -F': ' 'tolower($1)=="x-app-color"{print tolower($2)}' | tr -d '\r')
            if [[ "$status" == "200" && "$color" == "green" ]]; then
              echo "Green traffic confirmed."
              exit 0
            fi
            echo "Waiting for NGINX to route green (status=${status:-none}, color=${color:-none})..."
            sleep 2
          done
          docker compose ps
          docker compose logs --no-color nginx
          docker compose logs --no-color app_green
          exit 1
